<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tennis Rally Clipper 🎾</title>
    <style>
      :root {
        --primary: #10b981;
        --primary-hover: #059669;
        --bg: #f3f4f6;
        --text: #1f2937;
        --surface: #ffffff;
        --border: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 2rem 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      h1 { margin-top: 0; font-size: 2.5rem; text-align: center; }
      .container {
        background: var(--surface);
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        max-width: 800px;
        width: 100%;
      }
      .subtitle { text-align: center; color: #6b7280; margin-bottom: 2rem; font-size: 1.1rem; line-height: 1.5; }
      
      .dropzone {
        border: 2px dashed #9ca3af;
        border-radius: 8px;
        padding: 3rem 2rem;
        text-align: center;
        background: #f9fafb;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-bottom: 1.5rem;
      }
      .dropzone:hover, .dropzone.dragover {
        border-color: var(--primary);
        background: #ecfdf5;
      }
      .dropzone p { margin: 0; color: #4b5563; font-size: 1.1rem; pointer-events: none; }
      .dropzone .icon { font-size: 3rem; margin-bottom: 1rem; pointer-events: none; }
      #videoUpload { display: none; }

      .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 0.8rem 1.5rem;
        font-size: 1.1rem;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
      }
      .btn:hover { background: var(--primary-hover); }
      .btn:disabled { background: #9ca3af; cursor: not-allowed; }

      .progress-container { margin-top: 1.5rem; display: none; }
      .progress-bar {
        width: 100%;
        height: 8px;
        background: #e5e7eb;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 0.5rem;
      }
      .progress-fill {
        height: 100%;
        background: var(--primary);
        width: 0%;
        transition: width 0.3s ease;
      }
      .status-text { font-size: 0.9rem; font-weight: 600; color: #374151; margin-bottom: 0.2rem; }

      .terminal {
        background: #1e1e1e;
        color: #10b981;
        padding: 1rem;
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        height: 250px;
        overflow-y: auto;
        margin-top: 1.5rem;
        font-size: 0.85rem;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        display: none;
      }
      .terminal p { margin: 0.3rem 0; line-height: 1.4; }

      #result { margin-top: 2rem; text-align: center; }
      video { width: 100%; border-radius: 8px; background: #000; margin: 1rem 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      .download-btn {
        display: inline-block;
        background: #3b82f6;
        color: white;
        text-decoration: none;
        padding: 0.8rem 2rem;
        border-radius: 6px;
        font-weight: 600;
        font-size: 1.1rem;
        transition: background 0.2s;
      }
      .download-btn:hover { background: #2563eb; }
    </style>
    <script type="module" crossorigin src="/tennis-rally-web/assets/index-HqkDe5m8.js"></script>
  </head>
  <body>
    <h1>Tennis Rally Clipper 🎾</h1>
    <div class="container">
      <p class="subtitle">100% Client-Side AI Video Highlights.<br/>Upload your match, we'll extract the best rallies using Spectral Onset Detection. Your video never leaves your device.</p>
      
      <div class="dropzone" id="dropzone">
        <div class="icon">📁</div>
        <p id="dropzone-text">Drag & drop your tennis video here, or click to browse</p>
      </div>
      <input type="file" id="videoUpload" accept="video/mp4,video/x-m4v,video/*" />
      
      <button id="startBtn" class="btn" disabled>Analyze & Extract Highlights</button>
      
      <div class="progress-container" id="progressContainer">
        <div class="status-text" id="statusText">Initializing...</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="terminal" id="log"></div>
      <div id="result"></div>
    </div>
  </body>
</html>
